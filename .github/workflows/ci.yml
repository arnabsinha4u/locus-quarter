name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .

  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Mypy
        run: mypy src locus_quarter.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Pytest with coverage
        run: pytest -q --cov=src/locus_quarter_app --cov-branch --cov-report=xml --cov-report=term
      - name: Enforce coverage gates
        run: python scripts/check_coverage_gates.py --min-statement 90 --min-branch 80

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Secret scan
        run: detect-secrets scan --baseline .secrets.baseline
      - name: Dependency audit
        run: pip-audit

  mutation-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Mutation subset gate
        run: |
          mutmut run --paths-to-mutate src/locus_quarter_app --runner "python -m pytest -q test/test_mutation_smoke.py"
          python scripts/check_mutation_score.py --min-score 70
