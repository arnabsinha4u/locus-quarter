name: Nightly Mutation

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  mutation-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Full mutation run
        run: |
          mutmut run --paths-to-mutate src/locus_quarter --runner "python -m pytest -q"
          python scripts/check_mutation_score.py --min-score 80
