[tox]
envlist = py311,lint,type,security,mutation
isolated_build = true

[testenv]
deps = .[dev]
commands = pytest

[testenv:lint]
deps = .[dev]
commands =
  ruff check .
  ruff format --check .

[testenv:type]
deps = .[dev]
commands = mypy src locus_quarter.py

[testenv:security]
deps = .[dev]
commands =
  detect-secrets scan --baseline .secrets.baseline
  pip-audit

[testenv:mutation]
deps = .[dev]
commands =
  mutmut run > mutmut-run.log
  python scripts/check_mutation_score.py --min-score 70 --log-file mutmut-run.log
